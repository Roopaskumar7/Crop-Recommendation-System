<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Optional Bootstrap JS for Navbara (if needed) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-gray-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a class="text-xl font-bold flex items-center gap-2" href="/">
                <span class="text-green-400 text-2xl">🌱</span> Crop Recommendation
            </a>
            <div class="space-x-4 flex-grow text-center">
                <a class="hover:text-green-400 transition-colors" href="#">Home</a>
                <a class="hover:text-green-400 transition-colors" href="#">Contact</a>
                <a class="hover:text-green-400 transition-colors" href="#">About</a>
            </div>
            <form class="d-flex" role="search">
                <input class="form-control me-2 bg-gray-700 text-white border-none rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-green-400" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success text-white border border-green-400 hover:bg-green-400 hover:text-gray-900 rounded-lg py-2 px-4 transition-colors" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container mx-auto mt-10 p-8 bg-white shadow-xl rounded-2xl max-w-4xl">
        <h1 class="text-4xl font-extrabold text-center text-gray-800 mb-6 flex items-center justify-center gap-4">
            Crop Recommendation System
            <span class="text-green-500">🌱</span>
        </h1>

        <!-- Input Form -->
        <form action="/predict" method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <!-- Nitrogen Input -->
                <div>
                    <label for="Nitrogen" class="block text-sm font-medium text-gray-700">Nitrogen (N)</label>
                    <input type="number" id="Nitrogen" name="Nitrogen" placeholder="Enter Nitrogen" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>

                <!-- Phosphorus Input -->
                <div>
                    <label for="Phosporus" class="block text-sm font-medium text-gray-700">Phosphorus (P)</label>
                    <input type="number" id="Phosporus" name="Phosporus" placeholder="Enter Phosphorus" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>

                <!-- Potassium Input -->
                <div>
                    <label for="Potassium" class="block text-sm font-medium text-gray-700">Potassium (K)</label>
                    <input type="number" id="Potassium" name="Potassium" placeholder="Enter Potassium" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>

                <!-- Temperature Input -->
                <div>
                    <label for="Temperature" class="block text-sm font-medium text-gray-700">Temperature (°C)</label>
                    <input type="number" step="0.01" id="Temperature" name="Temperature" placeholder="Enter Temperature" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>

                <!-- Humidity Input -->
                <div>
                    <label for="Humidity" class="block text-sm font-medium text-gray-700">Humidity (%)</label>
                    <input type="number" step="0.01" id="Humidity" name="Humidity" placeholder="Enter Humidity" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>

                <!-- Ph Input -->
                <div>
                    <label for="Ph" class="block text-sm font-medium text-gray-700">pH Value</label>
                    <input type="number" step="0.01" id="Ph" name="Ph" placeholder="Enter pH value" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>

                <!-- Rainfall Input -->
                <div>
                    <label for="Rainfall" class="block text-sm font-medium text-gray-700">Rainfall (mm)</label>
                    <input type="number" step="0.01" id="Rainfall" name="Rainfall" placeholder="Enter Rainfall" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2" required>
                </div>
            </div>

            <div class="mt-8 text-center">
                <button type="submit" class="px-8 py-3 bg-green-500 text-white font-semibold rounded-full shadow-lg hover:bg-green-600 transition-colors transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-green-300">
                    Get Recommendation
                </button>
            </div>
        </form>

        <!-- Prediction Result Card -->
        <div class="mt-10 max-w-sm mx-auto bg-green-500 text-white rounded-xl shadow-lg overflow-hidden md:max-w-md">
            <div class="md:flex p-8 items-center justify-center text-center">
                <div>
                    <div class="uppercase tracking-wide text-lg font-semibold text-white">Recommended Crop</div>
                    <p class="mt-2 text-6xl font-extrabold">{{ result }}</p>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
